spring.application.name=identity-frontend-vaadin
server.port=8081

spring.jpa.open-in-view=false
# Database
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:liquibase-changelog.yml


identity.encryption.blind-index-key=${IDENTITY_SERVICE_ENCRYPTION_BLIND_INDEX_KEY:}
identity.encryption.current-key-id=0
# Base64-encoded 32-byte AES-256 key; regenerate with: openssl rand -base64 32
identity.encryption.keys.0=${IDENTITY_SERVICE_ENCRYPTION_KEY_0:}
identity.email.from=noreply@identity-service.local

unique-id.rest-client.base-url=http://localhost:8080

# External public origin of this deployment; the Vaadin frontend combines it with the verify route to build
# absolute confirmation links. Origin only: scheme://host[:port], no path, trailing slash optional.
identity.service.public-url=https://identity.app-vg.com

identity.telegram.bot.name=Identityvgbot
identity.telegram.bot.auth-date-ttl:PT1H
