databaseChangeLog:
  - changeSet:
      id: 001-0
      author: vg
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - createTable:
            tableName: identity_principal
            columns:
              - column:
                  name: unique_id
                  type: BIGINT
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_identity_principal
              - column:
                  name: version
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: DATETIME
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: DATETIME
                  constraints:
                    nullable: false
              - column:
                  name: display_name
                  type: BLOB
              - column:
                  name: status
                  type: SMALLINT
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: SMALLINT
                  constraints:
                    nullable: false
  - changeSet:
      id: 001-1
      author: vg
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - createTable:
            columns:
              - column:
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_identity_user
                    foreignKeyName: fk_identity_user_to_identity_principal
                    referencedTableName: identity_principal
                    referencedColumnNames: unique_id
                  name: unique_id
                  type: BIGINT
              - column:
                  constraints:
                    nullable: false
                  name: version
                  type: INT
              - column:
                  name: username_hash
                  type: BINARY(32)
                  constraints:
                    unique: true
                    uniqueConstraintName: uk_identity_user_username_hash
              - column:
                  constraints:
                    nullable: false
                  name: username
                  type: BLOB
              - column:
                  name: password
                  type: BLOB
              - column:
                  name: consent_to_keep_personal_data_at
                  type: DATETIME
              - column:
                  name: data
                  type: MEDIUMBLOB
              - column:
                  constraints:
                    nullable: false
                  name: created_at
                  type: DATETIME
              - column:
                  constraints:
                    nullable: false
                  name: updated_at
                  type: DATETIME
            tableName: identity_user
  - changeSet:
      id: 001-2
      author: vg
      changes:
        - createTable:
            tableName: identity_user_channel
            columns:
              - column:
                  name: unique_id
                  type: BIGINT
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_identity_communication_channel
              - column:
                  name: version
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: identity_user_unique_id
                  type: BIGINT
                  constraints:
                    nullable: true
                    foreignKeyName: fk_identity_channel_to_identity_user
                    referencedTableName: identity_user
                    referencedColumnNames: unique_id
              - column:
                  name: channel_type
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: channel_user_id
                  type: BLOB
                  constraints:
                    nullable: false
              - column:
                  name: channel_user_id_hash
                  type: BINARY(32)
                  constraints:
                    nullable: false
              - column:
                  name: data
                  type: MEDIUMBLOB
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: DATETIME
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: DATETIME
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: identity_user_channel
            columnNames: channel_type, channel_user_id_hash
            constraintName: unq_identity_user_channel_user_id
  - changeSet:
      id: 001-3
      author: vg
      changes:
        - createTable:
              columns:
                - column:
                    constraints:
                      nullable: false
                      primaryKey: true
                      primaryKeyName: pk_identity_user_system_role
                      foreignKeyName: fk_identity_user_system_role_to_identity_principal
                      referencedTableName: identity_principal
                      referencedColumnNames: unique_id
                    name: identity_principal_unique_id
                    type: BIGINT
                - column:
                    constraints:
                      nullable: false
                      primaryKey: true
                      primaryKeyName: pk_identity_user_system_role
                    name: role
                    type: SMALLINT
                - column:
                    constraints:
                      nullable: false
                    name: created_at
                    type: DATETIME
              tableName: identity_user_system_role
  - changeSet:
      id: 001-4
      author: vg
      changes:
        - createTable:
            tableName: identity_workspace
            columns:
              - column:
                  name: unique_id
                  type: BIGINT
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_identity_workspace
              - column:
                  name: version
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: DATETIME
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: DATETIME
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: BLOB
  - changeSet:
      id: 001-5
      author: vg
      changes:
        - createTable:
            tableName: identity_permission
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_identity_permission
              - column:
                  name: created_at
                  type: DATETIME
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uk_identity_permission_name
  - changeSet:
      id: 001-6
      author: vg
      changes:
        - createTable:
            tableName: identity_user_resource_permission
            columns:
              - column:
                  name: principal_unique_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_identity_user_resource_permission
                    foreignKeyName: fk_identity_user_resource_permission_to_principal
                    referencedTableName: identity_principal
                    referencedColumnNames: unique_id
              - column:
                  name: resource_unique_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_identity_user_resource_permission
              - column:
                  name: permission_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_identity_user_resource_permission
                    foreignKeyName: fk_identity_user_resource_permission_to_permission
                    referencedTableName: identity_permission
                    referencedColumnNames: id
              - column:
                  name: created_at
                  type: DATETIME
                  constraints:
                    nullable: false
  - changeSet:
      id: 001-7
      author: vg
      changes:
        - createTable:
            tableName: identity_role_template
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_identity_role_template
              - column:
                  name: version
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: DATETIME
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: DATETIME
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uk_identity_role_template_name
              - column:
                  name: description
                  type: TEXT
        - createTable:
            tableName: identity_role_template_permission
            columns:
              - column:
                  name: role_template_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_identity_role_template_permission
                    foreignKeyName: fk_role_template_permission_to_role_template
                    referencedTableName: identity_role_template
                    referencedColumnNames: id
              - column:
                  name: permission_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_identity_role_template_permission
                    foreignKeyName: fk_role_template_permission_to_permission
                    referencedTableName: identity_permission
                    referencedColumnNames: id
  - changeSet:
      id: 001-8
      author: vg
      changes:
        - createTable:
            tableName: identity_role
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_identity_role
              - column:
                  name: version
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: DATETIME
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: DATETIME
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: workspace_unique_id
                  type: BIGINT
                  constraints:
                    nullable: true
                    foreignKeyName: fk_identity_role_to_workspace
                    referencedTableName: identity_workspace
                    referencedColumnNames: unique_id
        - sql:
            dbms: mysql
            splitStatements: false
            sql: >
              ALTER TABLE identity_role
              ADD COLUMN role_key VARCHAR(128)
              GENERATED ALWAYS AS (
                  CASE
                      WHEN workspace_unique_id IS NULL THEN name
                      ELSE CONCAT(workspace_unique_id, ':', name)
                  END
              ) STORED
        - sql:
            dbms: mysql
            sql: >
              ALTER TABLE identity_role
              ADD CONSTRAINT uk_identity_role_key UNIQUE (role_key)
        - createTable:
            tableName: identity_role_assignment
            columns:
              - column:
                  name: principal_unique_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_identity_role_assignment
                    foreignKeyName: fk_role_assignment_to_principal
                    referencedTableName: identity_principal
                    referencedColumnNames: unique_id
              - column:
                  name: role_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_identity_role_assignment
                    foreignKeyName: fk_role_assignment_to_role
                    referencedTableName: identity_role
                    referencedColumnNames: id
              - column:
                  name: access_scope
                  type: SMALLINT
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_identity_role_assignment
              - column:
                  name: created_at
                  type: DATETIME
                  constraints:
                    nullable: false
        - createTable:
            tableName: identity_role_permission
            columns:
              - column:
                  name: role_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_identity_role_permission
                    foreignKeyName: fk_role_permission_to_role
                    referencedTableName: identity_role
                    referencedColumnNames: id
              - column:
                  name: permission_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_identity_role_permission
                    foreignKeyName: fk_role_permission_to_permission
                    referencedTableName: identity_permission
                    referencedColumnNames: id
